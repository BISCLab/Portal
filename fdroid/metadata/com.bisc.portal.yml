Name: Portal
Summary: Privacy-first web bookmark launcher
Description: |-
  Portal replaces bloated social media apps with a clean, fullscreen tile grid
  that opens websites directly in your preferred browser.

  No accounts. No tracking. No cloud. Just tiles.

  Features:

  * Fullscreen tile grid (Metro / Windows Phone inspired)
  * Multiple pages with custom names and drag-to-reorder
  * Per-page grid preset: 10x18 (default) or 12x24 (dense)
  * Drag-to-move and resize tiles in edit mode
  * Layout lock to prevent accidental changes
  * Infinite vertical scroll or fixed-height grid per page
  * Horizontal page wrap (loop from last back to first)
  * Custom icons: 1000+ Simple Icons SVG logos, gallery images
  * Icon zoom slider per tile
  * Custom icon and color per bottom bar button
  * Collapsible, always-visible, or hidden bottom bar
  * App lock with password and one-time reset code
  * Statistics: optional click tracking, stored locally only
  * Backup and restore via JSON export/import
  * Dark / Light / System theme
  * No Google Play Services required
  * Works on GrapheneOS and de-Googled devices

  Permissions: none. URLs are opened via Android Intent — the browser handles the network.

